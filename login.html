<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bringaterv – Bejelentkezés</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10vh;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #111;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('./src/assets/btervlogin.png');
      background-size: cover;
      background-position: center 40%;
      filter: brightness(0.55) saturate(0.85);
      transform: scale(1.04);
    }

    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: calc(100vw - 32px);
      padding: 24px 36px 20px;
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      color: #1a1a1a;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.40);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo-img {
      width: 40px;
      height: 40px;
      border-radius: 9px;
    }

    .logo-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
      color: #1a1a1a;
    }

    .logo-text .accent { color: #fc4c02; }

    .subtitle {
      font-size: 12.5px;
      color: rgba(0, 0, 0, 0.40);
      margin-bottom: 18px;
      letter-spacing: 0.2px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(0,0,0,0.30);
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: rgba(0, 0, 0, 0.06);
      border: 1.5px solid rgba(0, 0, 0, 0.12);
      border-radius: 10px;
      color: #1a1a1a;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(0, 0, 0, 0.30); }

    input:focus {
      border-color: #fc4c02;
      background: rgba(252, 76, 2, 0.04);
    }

    .error-msg {
      font-size: 12.5px;
      color: #d63030;
      margin-bottom: 10px;
      min-height: 18px;
      text-align: left;
      padding-left: 2px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #fc4c02;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      letter-spacing: 0.2px;
      margin-top: 4px;
    }

    .login-btn:hover { background: #e04400; }
    .login-btn:active { transform: scale(0.98); }

    .card-footer {
      margin-top: 14px;
      font-size: 11px;
      color: rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="card">
    <div class="logo-wrap">
      <img src="./src/assets/logo.png" alt="Bringaterv logó" class="logo-img">
      <span class="logo-text">Bringa<span class="accent">terv</span></span>
    </div>

    <p class="subtitle">Tervezz. Tekerj. Fedezd fel.</p>

    <form id="loginForm" novalidate>
      <div class="input-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input id="username" type="text" name="username"
          placeholder="Felhasználónév" autofocus autocomplete="username">
      </div>

      <div class="input-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input id="password" type="password" name="password"
          placeholder="Jelszó" autocomplete="current-password">
      </div>

      <p class="error-msg" id="errorMsg" aria-live="polite"></p>

      <button class="login-btn" type="submit">Belépés</button>
    </form>

    <p class="card-footer">Bringaterv &nbsp;·&nbsp; v0.8 &nbsp;·&nbsp; © Czibolya Dániel 2026</p>
  </div>

  <script type="module">
    import { login, isAuthenticated } from "./src/auth.js";

    if (isAuthenticated()) {
      window.location.replace("./index.html");
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value;
      const errEl = document.getElementById("errorMsg");

      if (login(user, pass)) {
        window.location.replace("./index.html");
      } else {
        errEl.textContent = "Hibás felhasználónév vagy jelszó.";
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });
  </script>
</body>
</html>
