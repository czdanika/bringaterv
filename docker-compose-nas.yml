# ── Bringaterv – NAS / éles telepítés ────────────────────────────────────────
#
# Ez a fájl NAS-on és éles szerveren használandó.
# A képeket a GitHub Container Registry-ből húzza (GitHub Actions buildeli).
#
# Helyi fejlesztéshez / Pi teszthez: docker-compose.yml (build: direktívával)
#
# ⚠️  FONTOS: Éles használat előtt változtasd meg:
#   - ADMIN_PASSWORD  – admin belépési jelszó
#   - JWT_SECRET      – véletlenszerű, legalább 32 karakteres string

services:

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  bringaterv:
    image: ghcr.io/czdanika/bringaterv:latest
    ports:
      - "8088:80"             # bal: külső port – változtasd meg, ha kell
    environment:
      LOGIN_ENABLED: true     # false → nem kér jelszót (házon belüli hálózaton)
    depends_on:
      - routes-api
    networks:
      - bringaterv-net
    restart: unless-stopped

  # ── Útvonaltár API (Flask) ──────────────────────────────────────────────────
  # Kívülről NEM elérhető – csak az nginx-en keresztül, belső hálózaton
  routes-api:
    image: ghcr.io/czdanika/bringaterv-api:latest
    environment:
      SAMPLES_DIR:     /samples           # beépített minták (image-be égetve)
      DB_PATH:         /data/bringaterv.db
      MULTI_DATA_DIR:  /data/users        # per-user GPX könyvtárak
      ADMIN_EMAIL:     bringa             # ← admin belépési azonosító
      ADMIN_PASSWORD:  terv               # ← VÁLTOZTASD MEG!
      JWT_SECRET:      valtozd_meg        # ← KÖTELEZŐ MEGVÁLTOZTATNI!
      JWT_EXPIRY_DAYS: 30                 # token élettartama napban
    volumes:
      - routes-data:/data   # perzisztens tároló (DB + user GPX-ek)
    networks:
      - bringaterv-net
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  routes-data:
    # Docker kezeli a helyét – frissítéskor megmarad, adatvesztés nélkül
    #
    # Ha konkrét NAS mappát akarsz bind mount-ként (opcionális):
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /volume1/docker/bringaterv-data

# ── Hálózat ──────────────────────────────────────────────────────────────────
networks:
  bringaterv-net:
    driver: bridge
