server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Helyes MIME típusok ES modulokhoz
    types {
        text/html                   html htm;
        application/javascript      js mjs;
        text/css                    css;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/svg+xml               svg;
        image/x-icon                ico;
        application/json            json;
        application/gpx+xml         gpx;
        font/woff2                  woff2;
        font/woff                   woff;
    }

    # Statikus fájlok (képek, fontok) – hosszú cache
    location ~* \.(png|jpg|jpeg|svg|ico|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # JS és CSS – mindig ellenőrzés (frissítés után azonnal betölti az újat)
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
