server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── MIME típusok ────────────────────────────────────────────────────────
    types {
        text/html                   html htm;
        application/javascript      js mjs;
        text/css                    css;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/svg+xml               svg;
        image/x-icon                ico;
        application/json            json;
        application/gpx+xml         gpx;
        font/woff2                  woff2;
        font/woff                   woff;
    }

    # ── Útvonaltár API proxy ─────────────────────────────────────────────────
    # Minden /api/ kezdetű kérés a Flask routes-api konténerbe kerül.
    # A konténer neve a Docker Compose service neve (routes-api),
    # amit a belső bringaterv-net hálózaton old fel a DNS.
    location /api/ {
        proxy_pass         http://routes-api:5001;
        proxy_http_version 1.1;

        # Fejlécek továbbítása (Flask logokban látszódjon az eredeti IP)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Nagy GPX fájlok feltöltéséhez (max 10 MB)
        client_max_body_size 10m;

        # Timeout – gunicorn 120s timeout-jával összhangban
        proxy_read_timeout 130s;
        proxy_connect_timeout 10s;
    }

    # ── Statikus fájlok (képek, fontok) – hosszú cache ───────────────────────
    location ~* \.(png|jpg|jpeg|svg|ico|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── JS és CSS – mindig ellenőrzés (frissítés után azonnal betölti az újat) ──
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
