# ── Bringaterv – Docker Compose ──────────────────────────────────────────────
#
# Két szolgáltatás:
#   bringaterv   – nginx, statikus frontend (port: ${PORT:-8088})
#   routes-api   – Flask REST API, csak belső hálózaton érhető el
#
# Volume:
#   routes-data  – felhasználói GPX fájlok és index.json tartós tárolása
#                  (Docker volume, NAS-on /var/lib/docker/volumes/... alatt)
#
# Hálózat:
#   bringaterv-net – belső bridge hálózat; routes-api kívülről NEM elérhető

services:

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  bringaterv:
    # Éles: image: ghcr.io/czdanika/bringaterv:latest
    build:
      context: .
    ports:
      - "${PORT:-8088}:80"
    environment:
      LOGIN_ENABLED:  ${LOGIN_ENABLED:-true}
      LOGIN_USER:     ${LOGIN_USER:-bringa}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-terv}
      APP_MODE:       ${APP_MODE:-single}
    depends_on:
      - routes-api
    networks:
      - bringaterv-net
    restart: unless-stopped

  # ── Útvonaltár API (Flask) ──────────────────────────────────────────────────
  routes-api:
    # Éles: GHCR-ről húzza (GitHub Actions buildeli)
    # image: ghcr.io/czdanika/bringaterv-api:latest
    # Helyi fejlesztés / első telepítés előtt:
    build:
      context: ./routes-api
    environment:
      DATA_DIR:    /data/routes   # felhasználói GPX-ek helye (volume-ban)
      SAMPLES_DIR: /samples       # beépített minták (image-be égetve)

      # ── APP_MODE: single (alapért.) | multi ──────────────────────────────
      # single → minden marad ahogy volt, nincs auth
      # multi  → JWT auth, per-user adatok, admin panel, kvóta
      APP_MODE: ${APP_MODE:-single}

      # ── Multi mód beállítások (single módban figyelmen kívül hagyva) ─────
      DB_PATH:        /data/bringaterv.db     # SQLite adatbázis
      MULTI_DATA_DIR: /data/users             # per-user mappák
      # Multi módban a LOGIN_USER/PASSWORD lesz az admin – ha külön ADMIN_* nincs megadva
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-${LOGIN_USER:-bringa}}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-${LOGIN_PASSWORD:-terv}}
      JWT_SECRET:     ${JWT_SECRET:-change-me-please}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS:-30}
    volumes:
      - routes-data:/data    # tartós tároló (routes + db + users)
    networks:
      - bringaterv-net
    # Szándékosan NINCS ports: blokk → kívülről nem érhető el, csak nginx-en át
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  routes-data:
    # Named volume – Docker kezeli a helyét (NAS-on is perzisztens)
    # Ha konkrét NAS elérési utat akarsz, használd:
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /volume1/docker/bringaterv-routes

# ── Hálózat ──────────────────────────────────────────────────────────────────
networks:
  bringaterv-net:
    driver: bridge
